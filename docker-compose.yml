version: '3'

services:

  web:
    build: .
    container_name: apache_php
    ports:
      - "8080:80"
    volumes:
      - ./app:/var/www/html
    depends_on:
      - ldap
    networks:
      - red_interna

  ldap:
    image: osixia/openldap:latest
    container_name: ldap_server
    environment:
      LDAP_ORGANISATION: "Servibarras"
      LDAP_DOMAIN: "servibarras.com"
      LDAP_ADMIN_PASSWORD: "admin"
    ports:
      - "389:389"
    networks:
      - red_interna

networks:
  red_interna:
